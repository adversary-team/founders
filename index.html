<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gDversary.offsec | SECURE_AUTH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; font-family: 'JetBrains Mono', monospace; color: #f00; overflow: hidden; }
        .cert-card { border: 1px solid #400; background: linear-gradient(145deg, #050505, #100000); position: relative; display: none; box-shadow: 0 0 40px rgba(255,0,0,0.2); }
        .logo-container { filter: drop-shadow(0 0 10px rgba(255,0,0,0.7)); width: 70px; height: 70px; object-fit: contain; }
        #loading { letter-spacing: 0.5em; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div id="loading" class="text-[10px] text-red-800 font-bold">VERIFYING_INTEGRITY...</div>

    <div id="cert" class="cert-card p-10 max-w-sm w-full rounded-sm">
        <div style="position:absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(135deg, transparent 45%, rgba(255,0,0,0.05) 50%, transparent 55%); pointer-events:none;"></div>
        
        <div class="flex justify-between items-start mb-10 relative z-10">
            <div class="text-[8px] text-red-900 font-black leading-tight uppercase">
                Adversary Operations<br>Unit: Founders_Gen_1
            </div>
            <img src="img/2026-03-02_14-02.png" class="logo-container" onerror="this.src='https://i.ibb.co/L6V7K99/logo-adversary.png'">
        </div>

        <div class="relative z-10">
            <h1 class="text-4xl font-black text-red-600 mb-2 tracking-tighter italic" id="role-display">--</h1>
            <div class="h-0.5 bg-red-900 w-16 mb-8"></div>

            <div class="space-y-6">
                <div>
                    <p class="text-[8px] text-zinc-600 uppercase tracking-widest mb-1">Authenticated Subject</p>
                    <p id="n" class="text-xl text-zinc-200 font-bold uppercase tracking-tight"></p>
                </div>
                <div>
                    <p class="text-[8px] text-zinc-600 uppercase tracking-widest mb-1">Operative Callsign</p>
                    <p id="a" class="text-lg text-red-700 font-bold"></p>
                </div>
            </div>
        </div>

        <div class="mt-16 pt-4 border-t border-zinc-900 text-[8px] text-zinc-800 flex justify-between relative z-10 font-bold">
            <span id="s"></span>
            <span>SEC_CLEARANCE: LVL_7</span>
        </div>
    </div>

    <script>
        // DATA REGISTRY (Ofuscado y con Tokens de validación)
        // Estructura: [Rango, Nombre, Alias, Serial, Token_Privado]
        const _CORE = {
            "001": ["Rk9VTkRFUg==","QWxlamFuZHJvIEdvbnphbGV6","QWxleA==","MDAxLzAwOQ==","e9671d18f"],
            "002": ["Rk9VTkRFUg==","TWlndWVsIEFuZ2VsIEFiYWQ=","dGhlbWlr","MDAyLzAwOQ==","f1a2b3c4d"],
            "003": ["Rk9VTkRFUg==","Sm9zZSBNYW51ZWwgTnXDsWV6","ZWxoYWNrZXJldGljbw==","MDAzLzAwOQ==","a8b9c0d1e"],
            "004": ["Rk9VTkRFUg==","TWVyY2VkZXMgTXXDsW96","TQ==","MDA0LzAwOQ==","b2c3d4e5f"],
            "005": ["Rk9VTkRFUg==","SXNpcyBBbGJpb2w=","djNyZHVyNHM=","MDA1LzAwOQ==","c3d4e5f6a"],
            "006": ["Rk9VTkRFUg==","WHVxaWFuZyBsaXUteHU=","RWxhZHk=","MDA2LzAwOQ==","d0e5f6a7b"],
            "007": ["TUVNQkVS","QmVhdHJpeiBGcmVzbm8=","Q1ZFYQ==","MDA3LzAwOQ==","e5f6a7b8c"],
            "008": ["TUVNQkVS","UmFxdWVsIEdhbHZleA==","RGVhZHBvb2w=","MDA4LzAwOQ==","f6a7b8c9d"],
            "009": ["TUVNQkVS","RmFiaWFuIERlbGdhZG8=","RWxCZWNhcmlv","MDA5LzAwOQ==","a7b8c9d0e"]
        };

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const sig = params.get('sig');
            
            setTimeout(() => {
                document.getElementById('loading').style.display='none';
                
                // VALIDACIÓN CRÍTICA: El sig debe coincidir con el token interno del ID
                if(_CORE[id] && _CORE[id][4] === sig) {
                    const d = _CORE[id];
                    document.getElementById('role-display').innerText = atob(d[0]);
                    document.getElementById('n').innerText = atob(d[1]);
                    document.getElementById('a').innerText = `[ ${atob(d[2])} ]`;
                    document.getElementById('s').innerText = `SN: ${d[3]}`;
                    document.getElementById('cert').style.display = 'block';
                } else {
                    document.body.innerHTML = "<div class='text-red-600 text-[10px] font-bold tracking-tighter p-10'>CRITICAL_AUTH_FAILURE: DATA_TAMPERING_DETECTED<br>REPORTING_TO_CORE_OPERATIONS...</div>";
                }
            }, 1800);
        };
    </script>
</body>
</html>
