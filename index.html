<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADVERSARY FOUNDER | AUTHENTICATION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-red: #ff0000; --dark-bg: #050505; }
        body { background-color: var(--dark-bg); font-family: 'JetBrains Mono', monospace; color: white; overflow: hidden; touch-action: none; }
        .scanline { width: 100%; height: 2px; background: rgba(255, 0, 0, 0.1); position: absolute; top: 0; z-index: 10; animation: scan 4s linear infinite; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        .cert-card { border: 1px solid #330000; background: linear-gradient(145deg, #0a0a0a, #150000); box-shadow: 0 0 30px rgba(0, 0, 0, 1); position: relative; overflow: hidden; transition: transform 0.1s ease-out; cursor: pointer; }
        .hologram { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(135deg, transparent 45%, rgba(255, 0, 0, 0.15) 50%, transparent 55%); pointer-events: none; }
        .glitch { animation: glitch 1.5s linear infinite; }
        @keyframes glitch { 0% { transform: translate(0); } 10% { transform: translate(-1px, 1px); } 90% { transform: translate(1px, -1px); } 100% { transform: translate(0); } }
        #secret-msg { position: absolute; bottom: 10px; left: 0; width: 100%; text-align: center; font-size: 8px; color: #300; opacity: 0; transition: opacity 0.5s; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="scanline"></div>

    <div id="auth-screen" class="text-center">
        <p class="text-red-900 animate-pulse text-[10px] tracking-[0.3em] mb-4">DECRYPTING IDENTITY SHAFT...</p>
        <div class="w-48 h-0.5 bg-zinc-900 mx-auto overflow-hidden">
            <div class="w-full h-full bg-red-700 animate-[loading_1.5s_infinite]"></div>
        </div>
    </div>

    <div id="cert-container" class="hidden max-w-sm w-full">
        <div class="cert-card p-8 rounded-sm relative" id="card">
            <div class="hologram" id="hologram"></div>
            
            <div class="flex justify-between items-start mb-12">
                <div class="text-[9px] text-red-700 font-bold uppercase tracking-tighter leading-tight">
                    ADVERSARY OPS<br>SEC_CLEARANCE: FOUNDER
                </div>
                <div class="text-[9px] text-zinc-800" id="hex-decor"></div>
            </div>

            <h1 class="text-4xl font-black text-red-600 mb-1 glitch tracking-tighter">FOUNDER</h1>
            <div class="h-0.5 bg-red-950 w-12 mb-10"></div>

            <div class="space-y-8">
                <div>
                    <p class="text-[8px] text-zinc-600 uppercase tracking-widest mb-1">Subject</p>
                    <p class="text-xl font-bold uppercase tracking-tight text-zinc-200" id="real-name"></p>
                </div>
                <div>
                    <p class="text-[8px] text-zinc-600 uppercase tracking-widest mb-1">Callsign</p>
                    <p class="text-lg font-bold text-red-700" id="aka-name"></p>
                </div>
            </div>

            <div class="mt-16 flex justify-between items-end border-t border-zinc-900 pt-4">
                <div>
                    <p class="text-[8px] text-zinc-700">REG_INDEX</p>
                    <p class="text-[10px] font-mono text-zinc-500" id="serial-num"></p>
                </div>
                <div class="text-[10px] text-red-950 font-black italic">
                    ORIGIN_V1
                </div>
            </div>
            <div id="secret-msg text-red-600">PRIVILEGED ACCESS: KERNEL_LEVEL_GRANTED</div>
        </div>
    </div>

    <script>
        // Data ofuscada en Base64
        const _0x4f2a = {
            "001": "QWxlamFuZHJvIEdvbnphbGV6OkFsZXg6MDAxLzAwOQ==",
            "002": "TWlndWVsIEFuZ2VsIEFiYWQ6dGhlbWlrOjAwMi8wMDk=",
            "003": "Sm9zZSBNYW51ZWwgTnXDsWV6OmVsaGFja2VyZXRpY286MDAzLzAwOQ==",
            "004": "TWVyY2VkZXMgTXXDsW96Ok06MDA0LzAwOQ==",
            "005": "SXNpcyBBbGJpb2w6djNyZHVyNHM6MDA1LzAwOQ==",
            "006": "WHVxaWFuZyBsaXUteHU6RWxhZHk6MDA2LzAwOQ==",
            "007": "QmVhdHJpeiBGcmVzbm86Q1ZFYTowMDcvMDA5",
            "008": "UmFxdWVsIEdhbHZlejpEZWFkcG9vbDowMDgvMDA5",
            "009": "RmFiaWFuIERlbGdhZG86RWxCZWNhcmlvOjAwOS8wMDk="
        };

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        setTimeout(() => {
            if (_0x4f2a[id]) {
                const raw = atob(_0x4f2a[id]).split(':');
                document.getElementById('real-name').innerText = raw[0];
                document.getElementById('aka-name').innerText = `[ ${raw[1]} ]`;
                document.getElementById('serial-num').innerText = raw[2];
                document.getElementById('hex-decor').innerText = '0x' + (Math.random().toString(16) + '000000').slice(2, 10).toUpperCase();
                
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('cert-container').classList.remove('hidden');
            } else {
                document.body.innerHTML = "<div class='text-red-600 text-[10px]'>CRITICAL_ERROR: IDENTITY_NOT_FOUND</div>";
            }
        }, 1200);

        // Interacción Holográfica
        const card = document.getElementById('card');
        const holo = document.getElementById('hologram');
        const secret = document.getElementById('secret-msg');

        const updateVisuals = (x, y) => {
            holo.style.transform = `translate(${x/5}%, ${y/5}%)`;
            card.style.transform = `perspective(1000px) rotateY(${(x-50)/15}deg) rotateX(${(50-y)/15}deg)`;
        };

        window.addEventListener('mousemove', (e) => {
            updateVisuals((e.clientX / window.innerWidth) * 100, (e.clientY / window.innerHeight) * 100);
        });

        // Función secreta: Long Press para revelar mensaje
        let timer;
        card.addEventListener('mousedown', () => timer = setTimeout(() => secret.style.opacity = "1", 2000));
        card.addEventListener('mouseup', () => { clearTimeout(timer); secret.style.opacity = "0"; });
        card.addEventListener('touchstart', () => timer = setTimeout(() => secret.style.opacity = "1", 2000));
        card.addEventListener('touchend', () => { clearTimeout(timer); secret.style.opacity = "0"; });
    </script>
</body>
</html>
