<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aDversary.offsec | SECURE_AUTH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; font-family: monospace; color: #f00; overflow: hidden; }
        .cert-card { border: 1px solid #500; background: #080808; position: relative; display: none; }
        .logo { filter: drop-shadow(0 0 5px red); width: 60px; }
        #err { display: none; color: #f00; text-align: center; margin-top: 20%; font-weight: bold; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div id="loading">AUTHENTICATING_TOKEN...</div>
    <div id="err text-sm">CRITICAL: INTEGRITY_VIOLATION</div>

    <div id="cert" class="cert-card p-10 max-w-sm w-full border-red-900 shadow-2xl">
        <div class="flex justify-between items-start mb-8">
            <span class="text-[8px] opacity-50 uppercase">Access: <span id="r-type"></span></span>
            <img src="img/logo.png" class="logo" alt="aDversary_Logo">
        </div>
        <h1 class="text-3xl font-black mb-6 tracking-tighter" id="role-display">--</h1>
        <div class="space-y-4">
            <div><p class="text-[8px] text-zinc-600 uppercase">Subject</p><p id="n" class="text-lg text-white font-bold"></p></div>
            <div><p class="text-[8px] text-zinc-600 uppercase">Callsign</p><p id="a" class="text-red-600"></p></div>
        </div>
        <div class="mt-10 pt-4 border-t border-zinc-900 text-[8px] text-zinc-700 flex justify-between">
            <span id="s"></span><span>v2.0_STABLE</span>
        </div>
    </div>

    <script>
        // Mapping ofuscado y salts de seguridad
        const _0x = {
            "001": ["Rk9VTkRFUg==","QWxlamFuZHJvIEdvbnphbGV6","QWxleA==","MDAxLzAwOQ==","e9671d18f"],
            "002": ["Rk9VTkRFUg==","TWlndWVsIEFuZ2VsIEFiYWQ=","dGhlbWlr","MDAyLzAwOQ==","f1a2b3c4d"],
            "003": ["Rk9VTkRFUg==","Sm9zZSBNYW51ZWwgTnXDsWV6","ZWxoYWNrZXJldGljbw==","MDAzLzAwOQ==","a8b9c0d1e"],
            "004": ["Rk9VTkRFUg==","TWVyY2VkZXMgTXXDsW96","TQ==","MDA0LzAwOQ==","b2c3d4e5f"],
            "005": ["Rk9VTkRFUg==","SXNpcyBBbGJpb2w=","djNyZHVyNHM=","MDA1LzAwOQ==","c3d4e5f6a"],
            "006": ["Rk9VTkRFUg==","WHVxaWFuZyBsaXUteHU=","RWxhZHk=","MDA2LzAwOQ==","d0e5f6a7b"],
            "007": ["TUVNQkVS","QmVhdHJpeiBGcmVzbm8=","Q1ZFYQ==","MDA3LzAwOQ==","e5f6a7b8c"],
            "008": ["TUVNQkVS","UmFxdWVsIEdhbHZleA==","RGVhZHBvb2w=","MDA4LzAwOQ==","f6a7b8c9d"],
            "009": ["TUVNQkVS","RmFiaWFuIERlbGdhZG8=","RWxCZWNhcmlv","MDA5LzAwOQ==","a7b8c9d0e"]
        };

        window.onload = () => {
            const p = new URLSearchParams(window.location.search);
            const i = p.get('id'), s = p.get('sig');
            
            setTimeout(() => {
                document.getElementById('loading').style.display='none';
                if(_0x[i] && _0x[i][4] === s) {
                    const d = _0x[i];
                    document.getElementById('role-display').innerText = atob(d[0]);
                    document.getElementById('n').innerText = atob(d[1]);
                    document.getElementById('a').innerText = `[ ${atob(d[2])} ]`;
                    document.getElementById('s').innerText = `REF: ${d[3]}`;
                    document.getElementById('cert').style.display = 'block';
                } else {
                    document.body.innerHTML = "<div style='color:red; font-family:monospace; padding:20px;'>ACCESS_DENIED: NO_VALID_TOKEN_PRESENT</div>";
                }
            }, 1500);
        };
    </script>
</body>
</html>
