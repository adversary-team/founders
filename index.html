<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aDversary.offsec | SECURE_AUTH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --gold-metal: #d4af37;
            --bright-white: #ffffff;
            --neon-red: #ff0000;
        }

        body { background: #000; font-family: 'JetBrains Mono', monospace; color: #f00; overflow: hidden; touch-action: none; }
        
        /* Efecto de Escaneo de Línea */
        .scanline { width: 100%; height: 3px; background: rgba(255,0,0,0.1); position: absolute; top: 0; z-index: 10; animation: scan 3s linear infinite; pointer-events: none; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }

        /* Contenedor principal para la perspectiva 3D */
        #cert-container { perspective: 1000px; }

        /* Tarjeta del Certificado */
        .cert-card { 
            border: 1px solid #400; 
            background: linear-gradient(145deg, #050505, #100000); 
            position: relative; 
            display: none; 
            box-shadow: 0 0 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(212, 175, 55, 0.05); 
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
        }

        /* Brillo Holográfico Dinámico con destellos dorados */
        .hologram-shine { 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(135deg, transparent 40%, rgba(212, 175, 55, 0.08) 48%, rgba(255, 0, 0, 0.12) 50%, rgba(212, 175, 55, 0.08) 52%, transparent 60%); 
            pointer-events: none; 
            transition: background-position 0.1s ease-out;
            background-size: 200% 200%;
            background-position: 0% 0%;
            z-index: 5;
        }

        /* Tipografías Elite */
        .label-gold {
            color: var(--gold-metal);
            text-shadow: 0 0 5px rgba(212, 175, 55, 0.4);
            font-weight: 700;
            letter-spacing: 0.15em;
        }

        .data-white {
            color: var(--bright-white);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
        }

        .logo-container { filter: drop-shadow(0 0 10px rgba(255,0,0,0.8)); width: 75px; height: 75px; object-fit: contain; }
        .glitch { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="scanline"></div>

    <div id="loading" class="text-[10px] text-red-700 font-bold uppercase tracking-[0.5em]">ANALYZING_HANDSHAKE...</div>

    <div id="cert-container" class="hidden max-w-sm w-full">
        <div class="cert-card p-10 rounded-sm border-red-900" id="card">
            <div class="hologram-shine" id="shine"></div>
            
            <div class="flex justify-between items-start mb-10 relative z-10">
                <div class="text-[8px] text-red-800 font-black leading-tight uppercase">
                    Adversary Operations<br>
                    <span class="label-gold" style="font-size: 7px;">Clearance: Founder_Gen_1</span>
                </div>
                <img src="img/logo.png" class="logo-container" id="logo-main" alt="Logo">
            </div>

            <div class="relative z-10">
                <h1 class="text-4xl font-black text-red-600 mb-1 tracking-tighter italic uppercase glitch" id="role-display">--</h1>
                <div class="h-0.5 bg-red-900 w-20 mb-10"></div>

                <div class="space-y-8">
                    <div>
                        <p class="text-[8px] label-gold uppercase mb-1">Authenticated Subject</p>
                        <p id="n" class="text-xl data-white font-bold uppercase tracking-tight"></p>
                    </div>
                    <div>
                        <p class="text-[8px] label-gold uppercase mb-1">Operative Callsign</p>
                        <p id="a" class="text-lg text-red-700 font-bold tracking-wide"></p>
                    </div>
                </div>
            </div>

            <div class="mt-20 pt-4 border-t border-zinc-900 text-[8px] flex justify-between relative z-10 font-bold">
                <span id="s" class="text-zinc-600"></span>
                <span class="label-gold">SEC_STATUS: VERIFIED</span>
            </div>
        </div>
    </div>

    <script>
        function b64DecodeUnicode(str) {
            return decodeURIComponent(atob(str).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
        }

        const _DB = {
            "001": ["Rk9VTkRFUg==","QWxlamFuZHJvIEdvbnphbGV6","QWxleA==","MDAxLzAwOQ==","e9671d18f"],
            "002": ["Rk9VTkRFUg==","TWlndWVsIMOBbmdlbCBBYmFk","dGhlbWlr","MDAyLzAwOQ==","f1a2b3c4d"],
            "003": ["Rk9VTkRFUg==","Sm9zw6kgTWFudWVsIE51w7Fleg==","ZWxoYWNrZXJldGljbw==","MDAzLzAwOQ==","a8b9c0d1e"],
            "004": ["Rk9VTkRFUg==","TWVyY2VkZXMgTXXDsW96","TQ==","MDA0LzAwOQ==","b2c3d4e5f"],
            "005": ["Rk9VTkRFUg==","SXNpcyBBbGJpb2w=","djNyZHVyNHM=","MDA1LzAwOQ==","c3d4e5f6a"],
            "006": ["Rk9VTkRFUg==","WHVxaWFuZyBsaXUteHU=","RWxhZHk=","MDA2LzAwOQ==","d0e5f6a7b"],
            "007": ["TUVNQkVS","QmVhdHJpeiBGcmVzbm8=","Q1ZFYQ==","MDA3LzAwOQ==","e5f6a7b8c"],
            "008": ["TUVNQkVS","UmFxdWVsIEdhbHZleA==","RGVhZHBvb2w=","MDA4LzAwOQ==","f6a7b8c9d"],
            "009": ["TUVNQkVS","RmFiaWFuIERlbGdhZG8=","RWxCZWNhcmlv","MDA5LzAwOQ==","a7b8c9d0e"]
        };

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const sig = urlParams.get('sig');
            
            setTimeout(() => {
                document.getElementById('loading').style.display='none';
                if(_DB[id] && _DB[id][4] === sig) {
                    const data = _DB[id];
                    document.getElementById('role-display').innerText = b64DecodeUnicode(data[0]);
                    document.getElementById('n').innerText = b64DecodeUnicode(data[1]);
                    document.getElementById('a').innerText = `[ ${b64DecodeUnicode(data[2])} ]`;
                    document.getElementById('s').innerText = `SERIAL_REF: ${data[3]}`;
                    
                    document.getElementById('cert-container').classList.remove('hidden');
                    document.getElementById('card').style.display = 'block';
                } else {
                    document.body.innerHTML = "<div class='p-10 text-red-600 font-bold text-[10px] tracking-widest uppercase'>AUTH_ERR: INTEGRITY_VIOLATION</div>";
                }
            }, 1200);
        };

        const card = document.getElementById('card');
        const shine = document.getElementById('shine');

        const updateVisuals = (x, y) => {
            const rotateX = (50 - y) / 10;
            const rotateY = (x - 50) / 10;
            card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            shine.style.backgroundPosition = `${x}% ${y}%`;
        };

        window.addEventListener('mousemove', (e) => {
            updateVisuals((e.clientX / window.innerWidth) * 100, (e.clientY / window.innerHeight) * 100);
        });

        // Soporte táctil para móvil (sin sensores de giroscopio para evitar pedir permisos)
        window.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            updateVisuals((touch.clientX / window.innerWidth) * 100, (touch.clientY / window.innerHeight) * 100);
        }, { passive: true });
    </script>
</body>
</html>
